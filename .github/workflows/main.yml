name: Test, Build, and Deploy | Modul 01 - Lab2.2 Senior Project

on:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x]

    steps:
      - uses: actions/checkout@v4
      - name: Testing Build pre-Deploy
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm i
      - run: npm run build

  deploy:
    needs: test-build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x]

    steps:
      - name: Build app on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          command_timeout: 20m    # <-- 1. TAMBAHKAN INI: Mengubah timeout bawaan ke 20 menit
          script: |
            eval "$(ssh-agent -s)"
            ssh-add ~/.ssh/ssh-praktikan4
            
            # 2. TAMBAHKAN INI: Membatasi konsumsi RAM Node.js maksimal 512MB agar VM Lab tidak crash
            export NODE_OPTIONS="--max-old-space-size=512"
            
            echo "Cek folder project";
            if [ ! -d "${HOME}/senpro/515523/modul02/senpro-github-action/" ]; then
              echo "Repository belum di-clone. Cloning...";
              mkdir -p ~/senpro/515523/modul02;
              cd ~/senpro/515523/modul02;
              git clone https://github.com/fuykaa/senpro-github-action.git;
              cd ~/senpro/515523/modul02/senpro-github-action;
              echo "Install Package dan Build Project";
              npm install;
              npm run build;
            else
              echo "Repository sudah ada. Building...";
              cd ~/senpro/515523/modul02/senpro-github-action;
              git restore .;
              git pull origin main;
              echo "Install Package dan Build Project";
              npm install;
              npm run build;
            fi